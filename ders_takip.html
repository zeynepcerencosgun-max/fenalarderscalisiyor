<!DOCTYPE html>

<html lang="tr">

<head>

<meta charset="UTF-8">

<title>Ders Takip Pro</title>

<style>

body {

    font-family: -apple-system, BlinkMacSystemFont;

    background: linear-gradient(180deg, #0a0a0a, #121212);

    color: white;

    padding: 20px;

}

/* başlık */

h2 {

    font-weight: 600;

    margin-bottom: 15px;

}

/* kart */

.card {

    backdrop-filter: blur(20px);

    background: rgba(28,28,30,0.6);

    border-radius: 20px;

    padding: 15px;

    margin-bottom: 15px;

    box-shadow: 0 8px 20px rgba(0,0,0,0.3);

}

/* input */

input {

    width: 70px;

    padding: 8px;

    border-radius: 12px;

    border: none;

    background: #2c2c2e;

    color: white;

    text-align: center;

    font-size: 14px;

}

/* progress */

.progress {

    height: 8px;

    background: #2c2c2e;

    border-radius: 10px;

    margin-top: 10px;

}

.bar {

    height: 8px;

    background: linear-gradient(90deg, #0a84ff, #5ac8fa);

    border-radius: 10px;

}

/* buton */

button {

    padding: 12px;

    border-radius: 14px;

    border: none;

    background: linear-gradient(90deg, #0a84ff, #5ac8fa);

    color: white;

    font-weight: 600;

    width: 100%;

    margin-bottom: 20px;

}

/* leaderboard */

#leaderboard {

    margin-top: 25px;

    padding: 15px;

    border-radius: 20px;

    background: rgba(28,28,30,0.6);

    backdrop-filter: blur(20px);

}

</style>

</head>

<body>

<h2>📊 Ders Takip Pro</h2>

<button onclick="gonder()">Skorumu Paylaş 🚀</button>

<div id="app"></div>

<div id="leaderboard"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBx2bHzuhFvoStU3hrzas20M_U1B7gEAn4",

  authDomain: "ders-takip-38f46.firebaseapp.com",

  projectId: "ders-takip-38f46",

  storageBucket: "ders-takip-38f46.firebasestorage.app",

  messagingSenderId: "976341246560",

  appId: "1:976341246560:web:36b49be5f2160a01569905"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let username = localStorage.getItem("username");

if (!username) {

  username = prompt("Kullanıcı adın ne?");

  localStorage.setItem("username", username);

}

let dersler = JSON.parse(localStorage.getItem("dersler")) || [

{ad:"Paragraf", hedef:100, data:[0,0,0,0,0,0,0]},

{ad:"Problem", hedef:70, data:[0,0,0,0,0,0,0]},

{ad:"Geometri", hedef:50, data:[0,0,0,0,0,0,0]},

{ad:"11 Matematik", hedef:100, data:[0,0,0,0,0,0,0]},

{ad:"11 Fizik", hedef:60, data:[0,0,0,0,0,0,0]},

{ad:"11 Kimya", hedef:60, data:[0,0,0,0,0,0,0]},

{ad:"11 Biyoloji", hedef:60, data:[0,0,0,0,0,0,0]},

{ad:"TYT Matematik", hedef:35, data:[0,0,0,0,0,0,0]},

{ad:"TYT Fizik", hedef:30, data:[0,0,0,0,0,0,0]},

{ad:"TYT Kimya", hedef:30, data:[0,0,0,0,0,0,0]},

{ad:"TYT Biyoloji", hedef:30, data:[0,0,0,0,0,0,0]},

{ad:"Tarih", hedef:25, data:[0,0,0,0,0,0,0]},

{ad:"Coğrafya", hedef:25, data:[0,0,0,0,0,0,0]},

{ad:"Felsefe", hedef:25, data:[0,0,0,0,0,0,0]}

];

function save(){

    localStorage.setItem("dersler", JSON.stringify(dersler));

}

function toplamSoru(){

    return dersler.reduce((sum,d)=>sum + d.data.reduce((a,b)=>a+b,0),0);

}

function render(){

    const appDiv = document.getElementById("app");

    appDiv.innerHTML = "";

    dersler.forEach((ders,i)=>{

        const toplam = ders.data.reduce((a,b)=>a+b,0);

        const oran = Math.min((toplam/ders.hedef)*100,100);

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

        <h3>${ders.ad}</h3>

        Bugün: <input type="number" value="${ders.data[new Date().getDay()]}" onchange="update(${i}, this.value)">

        <p>${toplam} / ${ders.hedef}</p>

        <div class="progress"><div class="bar" style="width:${oran}%"></div></div>

        `;

        appDiv.appendChild(card);

    });

}

window.update = function(i,val){

    const gun = new Date().getDay();

    dersler[i].data[gun] = Number(val);

    save();

    render();

};

window.gonder = async function(){

    await addDoc(collection(db, "skorlar"), {

        isim: username,

        puan: toplamSoru()

    });

    alert("Skor gönderildi!");

    leaderboard();

};

async function leaderboard(){

    const div = document.getElementById("leaderboard");

    div.innerHTML = "<h2>🏆 Leaderboard</h2>";

    const snap = await getDocs(collection(db,"skorlar"));

    let liste = [];

    snap.forEach(doc => liste.push(doc.data()));

    liste.sort((a,b)=>b.puan - a.puan);

    liste.slice(0,10).forEach((k,i)=>{

        div.innerHTML += `<p>${i+1}. ${k.isim} - ${k.puan}</p>`;

    });

}

render();

leaderboard();

</script>

</body>

</html>
